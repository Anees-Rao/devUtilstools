<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00d084" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#00d084" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00d084" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d084" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00d084" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0f11"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1a1d20" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(120, 220)">
    <rect width="120" height="120" rx="24" fill="#00d084" fill-opacity="0.15" stroke="url(#border)" stroke-width="2"/>
    <path d="M45 35 L25 60 L45 85 M75 35 L95 60 L75 85" stroke="#00d084" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Brand name -->
  <text x="280" y="285" font-family="DM Sans, system-ui, sans-serif" font-weight="700" font-size="72" fill="#e8eaed" letter-spacing="-2">FreeDevTool</text>

  <!-- Tagline -->
  <text x="280" y="345" font-family="DM Sans, system-ui, sans-serif" font-weight="400" font-size="32" fill="#9aa3af">50+ free, fast, privacy-first developer tools</text>

  <!-- Pill badges -->
  <g transform="translate(120, 420)" font-family="JetBrains Mono, monospace" font-size="20" fill="#00d084">
    <rect x="0" y="0" width="170" height="44" rx="22" fill="#00d084" fill-opacity="0.12" stroke="#00d084" stroke-opacity="0.3" stroke-width="1"/>
    <text x="85" y="29" text-anchor="middle">no signup</text>

    <rect x="186" y="0" width="170" height="44" rx="22" fill="#00d084" fill-opacity="0.12" stroke="#00d084" stroke-opacity="0.3" stroke-width="1"/>
    <text x="271" y="29" text-anchor="middle">no ads</text>

    <rect x="372" y="0" width="200" height="44" rx="22" fill="#00d084" fill-opacity="0.12" stroke="#00d084" stroke-opacity="0.3" stroke-width="1"/>
    <text x="472" y="29" text-anchor="middle">runs in browser</text>
  </g>

  <!-- Domain -->
  <text x="120" y="560" font-family="JetBrains Mono, monospace" font-size="22" fill="#5c6470">freedevtool.org</text>

  <!-- Decorative tool icons (right side) -->
  <g transform="translate(820, 180)" opacity="0.7">
    <g transform="translate(0, 0)">
      <rect width="100" height="100" rx="14" fill="#141618" stroke="#2a2f36" stroke-width="1"/>
      <text x="50" y="62" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#00d084" font-weight="700">{ }</text>
    </g>
    <g transform="translate(120, 0)">
      <rect width="100" height="100" rx="14" fill="#141618" stroke="#2a2f36" stroke-width="1"/>
      <text x="50" y="62" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#00d084" font-weight="700">b64</text>
    </g>
    <g transform="translate(240, 0)">
      <rect width="100" height="100" rx="14" fill="#141618" stroke="#2a2f36" stroke-width="1"/>
      <text x="50" y="62" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#00d084" font-weight="700">.*</text>
    </g>
    <g transform="translate(60, 120)">
      <rect width="100" height="100" rx="14" fill="#141618" stroke="#2a2f36" stroke-width="1"/>
      <text x="50" y="62" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#00d084" font-weight="700">jwt</text>
    </g>
    <g transform="translate(180, 120)">
      <rect width="100" height="100" rx="14" fill="#141618" stroke="#2a2f36" stroke-width="1"/>
      <text x="50" y="62" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" fill="#00d084" font-weight="700">SQL</text>
    </g>
  </g>
</svg>
